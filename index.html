<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Megan & Tom — Wedding 2027</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>body,html{margin:0;padding:0;background:#edf3f7;} .leaflet-container{border-radius:0;} </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/plain" id="app-source">
    const { useState, useEffect } = React;

    const SUPABASE_URL = "https://coazascihbhgjrjxlqwg.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvYXphc2NpaGJoZ2pyanhscXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MDYwNjksImV4cCI6MjA5NTQ4MjA2OX0.pcvg9scLsnqMA5ctFkkbfF9GzRQeDYT_iuUVrJu_x9s";

    const EMAILJS_PUBLIC_KEY  = "rpcC_pF3gdy31nWkB";
    const EMAILJS_SERVICE_ID  = "service_5c44869";
    const EMAILJS_TEMPLATE_ID = "template_003uk4r";
    emailjs.init(EMAILJS_PUBLIC_KEY);

    const FUNCTIONS_URL = `${SUPABASE_URL}/functions/v1`;
    const supabaseHeaders = {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
    };

    const db = {
      insert: async (data) => {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/RSVP`, {
          method: "POST",
          headers: { ...supabaseHeaders, "Prefer": "return=minimal" },
          body: JSON.stringify(data),
        });
        if (!res.ok) {
          const msg = await res.text();
          throw new Error(msg);
        }
      },
      // Code lookup and admin RSVP reads happen server-side in Edge Functions
      // (using the service role key) so the anon key can never list codes or
      // dump the RSVP table directly via the REST API.
      validateCode: async (code) => {
        const res = await fetch(`${FUNCTIONS_URL}/validate-code`, {
          method: "POST",
          headers: supabaseHeaders,
          body: JSON.stringify({ code }),
        });
        if (!res.ok) return { valid: false };
        return res.json();
      },
      getAllAsAdmin: async (code) => {
        const res = await fetch(`${FUNCTIONS_URL}/admin-rsvps`, {
          method: "POST",
          headers: supabaseHeaders,
          body: JSON.stringify({ code }),
        });
        if (!res.ok) {
          const msg = await res.text();
          throw new Error(msg);
        }
        const { rsvps } = await res.json();
        return rsvps;
      },
    };



    const W = {
      names: "Megan & Tom",
      nameA: "Tom", nameB: "Megan",
      dateLong: "Saturday, 23rd October 2027",
      dateShort: "23.10.2027",
      venue: "Greenhill Hotel",
      address: "Red Dial, Wigton",
      postcode: "CA7 8LS",
      ceremonyTime: "2:00 PM",
      eveningTime: "5:00 PM",
    };

    const css = `
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap');
      :root {
        --blue:#7d9fb8; --blue-dark:#4a6d84; --blue-deep:#2e4f63;
        --blue-mid:#b8cdd9; --blue-light:#dce8ef; --blue-pale:#edf3f7;
        --blue-ghost:#f4f8fa; --white:#ffffff; --text:#2a3d4a;
        --text-muted:#7a96a6; --text-faint:#a8bfcc;
        --border:#ccdde8; --border-soft:#ddeaf2;
      }
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
      .app{min-height:100vh;background:var(--blue-pale);background-image:radial-gradient(ellipse at 20% 20%,#daeaf4 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,#cfe0ec 0%,transparent 60%);display:flex;align-items:flex-start;justify-content:center;font-family:'Jost',sans-serif;padding:40px 20px 60px;}
      .card{background:var(--white);width:100%;max-width:480px;padding:52px 44px;border:1px solid var(--border);position:relative;opacity:0;transform:translateY(20px);transition:opacity 0.9s cubic-bezier(0.16,1,0.3,1),transform 0.9s cubic-bezier(0.16,1,0.3,1);margin-top:20px;box-shadow:0 4px 32px rgba(74,109,132,0.07);}
      .card.visible{opacity:1;transform:translateY(0);}
      .card-wide{max-width:580px;}
      .corner{position:absolute;width:18px;height:18px;border-color:var(--blue);border-style:solid;}
      .c-tl{top:14px;left:14px;border-width:1px 0 0 1px;}.c-tr{top:14px;right:14px;border-width:1px 1px 0 0;}.c-bl{bottom:14px;left:14px;border-width:0 0 1px 1px;}.c-br{bottom:14px;right:14px;border-width:0 1px 1px 0;}
      .ornament{text-align:center;font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--blue-mid);letter-spacing:0.3em;margin-bottom:18px;display:block;width:100%;}
      .couple-name{font-family:'Cormorant Garamond',serif;font-weight:300;text-align:center;color:var(--blue-deep);line-height:1.05;letter-spacing:0.03em;}
      .divider{display:flex;align-items:center;gap:10px;margin:22px 0;}
      .div-line{flex:1;height:1px;background:var(--border-soft);}
      .div-diamond{width:5px;height:5px;background:var(--blue);transform:rotate(45deg);flex-shrink:0;}
      .label-sm{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-faint);font-weight:400;}
      .label-center{text-align:center;display:block;}
      .date-italic{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;font-weight:300;text-align:center;color:var(--blue-dark);}
      .venue-sm{font-size:12px;font-weight:300;text-align:center;color:var(--text-muted);letter-spacing:0.06em;line-height:1.8;}
      .sub-italic{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;font-weight:300;text-align:center;color:var(--text-muted);line-height:1.7;}
      .code-input{width:100%;border:none;border-bottom:1.5px solid var(--blue-light);background:transparent;padding:12px 0;font-family:'Jost',sans-serif;font-size:13px;font-weight:300;letter-spacing:0.18em;text-align:center;text-transform:uppercase;color:var(--blue-deep);outline:none;transition:border-color 0.25s;}
      .code-input:focus{border-bottom-color:var(--blue);}
      .code-input::placeholder{color:var(--blue-mid);letter-spacing:0.08em;text-transform:none;font-style:italic;font-family:'Cormorant Garamond',serif;font-size:15px;}
      .error-msg{font-size:11px;color:#b05060;text-align:center;margin-top:10px;letter-spacing:0.04em;font-style:italic;font-family:'Cormorant Garamond',serif;}
      .btn{width:100%;background:var(--blue-dark);color:var(--white);border:1px solid var(--blue-dark);padding:14px 24px;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;cursor:pointer;transition:background 0.2s,color 0.2s,border-color 0.2s;margin-top:24px;display:block;}
      .btn:hover{background:var(--blue-deep);border-color:var(--blue-deep);}
      .btn:disabled{background:var(--blue-mid);border-color:var(--blue-mid);cursor:not-allowed;}
      .btn-ghost{background:transparent;color:var(--blue-dark);border-color:var(--blue-light);}
      .btn-ghost:hover{background:var(--blue-pale);border-color:var(--blue);color:var(--blue-deep);}
      .badge{display:inline-block;font-size:8.5px;letter-spacing:0.2em;text-transform:uppercase;padding:5px 14px;border:1px solid var(--blue);color:var(--blue-dark);font-weight:400;background:var(--blue-ghost);}
      .detail-block{padding:16px 0;border-bottom:1px solid var(--border-soft);}
      .detail-block:last-child{border-bottom:none;}
      .detail-time{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:400;color:var(--blue-deep);margin-top:3px;}
      .detail-note{font-size:12px;font-weight:300;color:var(--text-muted);margin-top:2px;letter-spacing:0.04em;}
      .form-group{margin-bottom:26px;}
      .form-label{display:block;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;}
      .form-input{width:100%;border:none;border-bottom:1px solid var(--border-soft);background:transparent;padding:8px 0;font-family:'Jost',sans-serif;font-size:14px;font-weight:300;color:var(--text);outline:none;transition:border-color 0.2s;}
      .form-input:focus{border-bottom-color:var(--blue);}
      .form-input::placeholder{color:var(--blue-light);font-weight:300;}
      .form-textarea{resize:none;height:64px;line-height:1.6;}
      .toggle-row{display:flex;gap:10px;}
      .toggle-btn{flex:1;padding:11px 8px;border:1px solid var(--border-soft);background:transparent;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;color:var(--text-muted);transition:all 0.15s;}
      .toggle-btn.on{border-color:var(--blue-dark);background:var(--blue-dark);color:var(--white);}
      .toggle-btn:hover:not(.on){border-color:var(--blue);color:var(--blue-deep);background:var(--blue-ghost);}
      .check-circle{width:50px;height:50px;border:1px solid var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--blue-dark);background:var(--blue-ghost);}
      .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
      .admin-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--blue-deep);}
      .stat-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
      .stat-box{flex:1;min-width:70px;border:1px solid var(--border-soft);padding:14px 8px;text-align:center;background:var(--blue-ghost);}
      .stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--blue-deep);line-height:1;display:block;margin-bottom:4px;}
      .rsvp-table{width:100%;border-collapse:collapse;margin-top:12px;}
      .rsvp-table th{font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-faint);font-weight:400;padding:8px;text-align:left;border-bottom:1px solid var(--border);}
      .rsvp-table td{font-size:12px;font-weight:300;color:var(--text);padding:10px 8px;border-bottom:1px solid var(--blue-ghost);vertical-align:top;}
      .rsvp-table tr:last-child td{border-bottom:none;}
      .pill{display:inline-block;font-size:8px;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border-radius:2px;}
      .pill-yes{background:var(--blue-dark);color:var(--white);}
      .pill-no{background:var(--blue-ghost);color:var(--text-muted);border:1px solid var(--border-soft);}
      .pill-full{background:#ddeaf2;color:var(--blue-deep);border:1px solid var(--blue-light);}
      .pill-eve{background:#e8f0f6;color:var(--blue-dark);border:1px solid var(--blue-light);}
      .empty-state{text-align:center;padding:40px 0;font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--blue-mid);}
      .db-error{background:#fff0f0;border:1px solid #f0c0c0;padding:12px 16px;font-size:12px;color:#a04040;margin-top:12px;text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;}
    `;

    const Corners = () => (
      <React.Fragment>
        <div className="corner c-tl"/><div className="corner c-tr"/>
        <div className="corner c-bl"/><div className="corner c-br"/>
      </React.Fragment>
    );

    const Divider = () => (
      <div className="divider">
        <div className="div-line"/><div className="div-diamond"/><div className="div-line"/>
      </div>
    );


    function WeddingMap() {
      useEffect(() => {
        if (document.getElementById("wedding-map")._leaflet_id) return;
        const map = L.map("wedding-map", { zoomControl: true, scrollWheelZoom: false })
          .setView([54.8025, -3.1672], 15);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap contributors"
        }).addTo(map);
        const icon = L.divIcon({
          html: `<div style="background:var(--blue-dark);width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);"></div>`,
          iconSize: [14, 14],
          iconAnchor: [7, 7],
          className: ""
        });
        L.marker([54.8025, -3.1672], { icon })
          .addTo(map)
          .bindPopup("<b style='font-family:Georgia,serif;color:#2e4f63;'>Greenhill Hotel</b><br><span style='font-size:11px;color:#7a96a6;'>Red Dial, Wigton CA7 8LS</span>")
          .openPopup();
        return () => map.remove();
      }, []);
      return (
        <div style={{position:"relative",cursor:"pointer"}} onClick={() => window.open("https://maps.google.com/?q=Greenhill+Hotel,+Red+Dial,+Wigton,+CA7+8LS","_blank")}>
          <div id="wedding-map" style={{height:"200px",width:"100%",marginTop:"8px",border:"1px solid var(--border-soft)"}}></div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen]       = useState("login");
      const [guestType, setGuestType] = useState(null);
      const [code, setCode]           = useState("");
      const [loginError, setLoginError] = useState("");
      const [form, setForm]           = useState({ name:"", attending:null, song:"", dietary:"", message:"" });
      const [loading, setLoading]     = useState(false);
      const [visible, setVisible]     = useState(false);
      const [rsvps, setRsvps]         = useState([]);
      const [adminLoading, setAdminLoading] = useState(false);
      const [dbError, setDbError]     = useState("");
      const [checkingCode, setCheckingCode] = useState(false);

      useEffect(() => {
        const t = setTimeout(() => setVisible(true), 80);
        return () => clearTimeout(t);
      }, [screen]);

      const go = (next) => {
        setVisible(false);
        setTimeout(() => { setScreen(next); setDbError(""); }, 200);
      };

      const handleLogin = async () => {
        if (checkingCode || !code.trim()) return;
        setCheckingCode(true);
        setLoginError("");
        try {
          const { valid, type } = await db.validateCode(code);
          if (valid) {
            setGuestType(type);
            if (type === "admin") loadRsvps();
            go(type === "admin" ? "admin" : "invitation");
          } else {
            setLoginError("That code doesn't seem right — please check your invitation.");
          }
        } catch (e) {
          setLoginError("Couldn't reach the server — please try again.");
        }
        setCheckingCode(false);
      };

      const loadRsvps = async () => {
        setAdminLoading(true);
        try {
          const data = await db.getAllAsAdmin(code);
          setRsvps(data);
        } catch (e) {
          setDbError("Could not load RSVPs. Check your Supabase table is set up correctly.");
        }
        setAdminLoading(false);
      };

      const downloadCSV = () => {
        if (rsvps.length === 0) return;
        const headers = ["Name", "Guest Type", "Attending", "Song Request", "Dietary Requirements", "Message", "Submitted At"];
        const rows = rsvps.map(r => [
          r.name || "",
          r.guest_type === "fullday" ? "Full Day" : "Evening",
          r.attending ? "Yes" : "No",
          r.song || "",
          r.dietary || "",
          r.message || "",
          r.created_at ? new Date(r.created_at).toLocaleString("en-GB") : "",
        ]);
        const csvContent = [headers, ...rows]
          .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(","))
          .join("\n");
        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "TomAndMegan_RSVPs.csv";
        link.click();
        URL.revokeObjectURL(url);
      };

      const handleSubmit = async () => {
        if (!form.name.trim() || form.attending === null || !form.song.trim()) return;
        if (form.attending && !form.dietary.trim()) return;
        setLoading(true);
        setDbError("");
        try {
          // 1 — Save to Supabase
          await db.insert({
            name: form.name,
            attending: form.attending,
            guest_type: guestType,
            song: form.song,
            dietary: form.dietary || null,
            message: form.message || null,
          });

          // 2 — Send email notification
          try {
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
              guest_name:  form.name,
              attending:   form.attending ? "Yes — attending 🎉" : "No — not attending",
              guest_type:  guestType === "fullday" ? "Full Day Guest" : "Evening Guest",
              song:        form.song     || "Not provided",
              dietary:     form.dietary  || "None",
              message:     form.message  || "No message left",
            });
          } catch (emailErr) {
            console.warn("Email notification failed:", emailErr);
          }

          go("confirmed");
        } catch (e) {
          setDbError("Error: " + (e.message || "Unknown error — please try again."));
        }
        setLoading(false);
      };

      /* ── LOGIN ── */
      if (screen === "login") return (
        <React.Fragment>
          <style>{css}</style>
          <div className="app">
            <div className={`card ${visible ? "visible" : ""}`}>
              <Corners/>
              <div className="ornament" style={{textAlign:"center",letterSpacing:"0.3em",marginBottom:"14px"}}>✦ &nbsp; ✦ &nbsp; ✦</div>
              <h1 className="couple-name" style={{fontSize:52}}>
                {W.nameA}<br/>
                <span style={{fontSize:30,letterSpacing:"0.15em",color:"var(--blue-mid)"}}>& </span><br/>
                {W.nameB}
              </h1>
              <Divider/>
              <p className="date-italic">{W.dateLong}</p>
              <p className="venue-sm" style={{marginTop:6}}>{W.venue} · {W.address}</p>
              <div style={{height:36}}/>
              <p className="sub-italic" style={{marginBottom:28}}>
                You've been invited to celebrate with us.<br/>
                Please enter the code from your invitation.
              </p>
              <input className="code-input" placeholder="Your invitation code"
                value={code} onChange={e => setCode(e.target.value)}
                onKeyDown={e => e.key === "Enter" && handleLogin()}/>
              {loginError && <p className="error-msg">{loginError}</p>}
              <button className="btn" onClick={handleLogin} disabled={checkingCode}>{checkingCode ? "Checking…" : "Continue"}</button>
            </div>
          </div>
        </React.Fragment>
      );

      /* ── INVITATION ── */
      if (screen === "invitation") {
        const isFull = guestType === "fullday";
        return (
          <React.Fragment>
            <style>{css}</style>
            <div className="app">
              <div className={`card card-wide ${visible ? "visible" : ""}`}>
                <Corners/>
                <div style={{textAlign:"center",marginBottom:30}}>
                  <span className="badge">{isFull ? "Full Day Guest" : "Evening Guest"}</span>
                </div>
                <div className="ornament" style={{textAlign:"center",letterSpacing:"0.3em",marginBottom:"14px"}}>✦ &nbsp; ✦ &nbsp; ✦</div>
                <span className="label-sm label-center">Together with their families</span>
                <div style={{height:10}}/>
                <h1 className="couple-name" style={{fontSize:44}}>{W.names}</h1>
                <Divider/>
                <span className="label-sm label-center">joyfully invite you to celebrate their wedding</span>
                <div style={{height:30}}/>
                <div className="detail-block">
                  <span className="label-sm">Date</span>
                  <p className="detail-time">{W.dateLong}</p>
                </div>
                <div className="detail-block">
                  <span className="label-sm">Venue</span>
                  <p className="detail-time" style={{fontSize:18}}>{W.venue}</p>
                  <p className="detail-note">{W.address}, {W.postcode}</p>
                </div>
                {isFull ? (
                  <React.Fragment>
                    <div className="detail-block">
                      <span className="label-sm">Ceremony Begins</span>
                      <p className="detail-time">{W.ceremonyTime}</p>
                      <p className="detail-note">Please be seated by 1:45 PM</p>
                    </div>
                    <div className="detail-block">
                      <span className="label-sm">Wedding Reception & Canapés</span>
                      <p className="detail-time" style={{fontSize:16,color:"var(--text-muted)"}}>Following the ceremony</p>
                    </div>
                    <div className="detail-block">
                      <span className="label-sm">Evening Celebrations</span>
                      <p className="detail-time">{W.eveningTime}</p>
                      <p className="detail-note">Drinks, dancing & celebrations</p>
                    </div>
                  </React.Fragment>
                ) : (
                  <div className="detail-block">
                    <span className="label-sm">Evening Reception</span>
                    <p className="detail-time">{W.eveningTime}</p>
                    <p className="detail-note">Drinks, dancing & celebrations</p>
                  </div>
                )}
                <div style={{height:30}}/>
                <p className="sub-italic">
                  {isFull ? "We are so glad you're part of our whole day." : "We are so glad you're joining our celebrations."}
                </p>
                <div style={{height:16}}/>
                <p style={{fontFamily:"'Jost',sans-serif",fontSize:"10px",letterSpacing:"0.18em",textTransform:"uppercase",textAlign:"center",color:"var(--blue)",marginBottom:0}}>Please RSVP by 1st August 2027</p>

                <div style={{height:24}}/>

                <div className="detail-block">
                  <span className="label-sm">Dress Code</span>
                  <p className="detail-time" style={{fontSize:16,marginTop:4}}>Smart Wedding Wear</p>
                  <p className="detail-note" style={{marginTop:4}}>Please no black suits or dusty blue dresses</p>
                </div>

                <div className="detail-block" style={{borderBottom:"none"}}>
                  <span className="label-sm">Parking</span>
                  <p className="detail-time" style={{fontSize:16,marginTop:4}}>Free Parking On Site</p>
                  <p className="detail-note" style={{marginTop:4}}>Greenhill Hotel, Red Dial, Wigton CA7 8LS</p>
                  <WeddingMap/>
                  <a
                    href="https://maps.google.com/?q=Greenhill+Hotel,+Red+Dial,+Wigton,+CA7+8LS"
                    target="_blank"
                    rel="noopener noreferrer"
                    style={{display:"block",textAlign:"center",marginTop:"10px",fontFamily:"'Jost',sans-serif",fontSize:"9px",letterSpacing:"0.18em",textTransform:"uppercase",color:"var(--blue-dark)",textDecoration:"none",padding:"10px",border:"1px solid var(--border-soft)",background:"var(--blue-ghost)"}}
                  >
                    Open in Google Maps →
                  </a>
                </div>
                <div style={{height:30}}/>
                <button className="btn" onClick={() => go("rsvp")}>RSVP</button>
                <button className="btn btn-ghost" onClick={() => { setGuestType(null); setCode(""); go("login"); }}>Back to Login</button>
              </div>
            </div>
          </React.Fragment>
        );
      }

      /* ── RSVP ── */
      if (screen === "rsvp") {
        const attending = form.attending === true;
        const declining = form.attending === false;
        const valid = form.name.trim() && form.attending !== null && form.song.trim() &&
          (declining || (attending && form.dietary.trim()));
        return (
          <React.Fragment>
            <style>{css}</style>
            <div className="app">
              <div className={`card ${visible ? "visible" : ""}`}>
                <Corners/>
                <div className="ornament" style={{textAlign:"center",letterSpacing:"0.3em",marginBottom:"14px"}}>✦ &nbsp; ✦ &nbsp; ✦</div>
                <h2 className="couple-name" style={{fontSize:34,marginBottom:8}}>RSVP</h2>
                <span className="label-sm label-center">{W.names} · {W.dateShort}</span>
                <Divider/>
                <div style={{height:8}}/>
                <div className="form-group">
                  <label className="form-label">Your Full Name <span style={{color:"var(--blue)"}}>*</span></label>
                  <input className="form-input" placeholder="e.g. Jane Smith"
                    value={form.name} onChange={e => setForm({...form, name:e.target.value})}/>
                </div>
                <div className="form-group">
                  <label className="form-label">Will you be joining us? <span style={{color:"var(--blue)"}}>*</span></label>
                  <div className="toggle-row">
                    <button className={`toggle-btn ${attending ? "on" : ""}`} onClick={() => setForm({...form, attending:true})}>
                      Joyfully Accepts
                    </button>
                    <button className={`toggle-btn ${declining ? "on" : ""}`} onClick={() => setForm({...form, attending:false})}>
                      Regretfully Declines
                    </button>
                  </div>
                </div>
                {form.attending !== null && (
                  <React.Fragment>
                    <div className="form-group">
                      <label className="form-label">Song for the DJ playlist <span style={{color:"var(--blue)"}}>*</span></label>
                      <input className="form-input" placeholder="Song title & artist…"
                        value={form.song} onChange={e => setForm({...form, song:e.target.value})}/>
                    </div>
                    {attending && (
                      <div className="form-group">
                        <label className="form-label">Dietary requirements <span style={{color:"var(--blue)"}}>*</span></label>
                        <input className="form-input" placeholder="Allergies, intolerances, or write 'None'"
                          value={form.dietary} onChange={e => setForm({...form, dietary:e.target.value})}/>
                      </div>
                    )}
                    <div className="form-group">
                      <label className="form-label">A message for the couple&nbsp;
                        <span style={{color:"var(--text-faint)",fontStyle:"italic",textTransform:"none",letterSpacing:0}}>optional</span>
                      </label>
                      <textarea className="form-input form-textarea" placeholder="Share your well wishes…"
                        value={form.message} onChange={e => setForm({...form, message:e.target.value})}/>
                    </div>
                  </React.Fragment>
                )}
                {dbError && <div className="db-error">{dbError}</div>}
                <button className="btn" onClick={handleSubmit} disabled={!valid || loading}>
                  {loading ? "Sending…" : "Send RSVP"}
                </button>
                <button className="btn btn-ghost" onClick={() => go("invitation")}>Back to Invitation</button>
              </div>
            </div>
          </React.Fragment>
        );
      }

      /* ── CONFIRMED ── */
      if (screen === "confirmed") {
        const accepted = form.attending;
        return (
          <React.Fragment>
            <style>{css}</style>
            <div className="app">
              <div className={`card ${visible ? "visible" : ""}`}>
                <Corners/>
                <div className="check-circle">{accepted ? "♡" : "✦"}</div>
                <h2 className="couple-name" style={{fontSize:34,marginBottom:10}}>
                  {accepted ? "See you there!" : "We'll miss you"}
                </h2>
                <Divider/>
                <p className="sub-italic" style={{marginBottom:28}}>
                  {accepted
                    ? `Thank you, ${form.name}. We cannot wait to celebrate with you on the 23rd.`
                    : `Thank you for letting us know, ${form.name}. You will be very much missed.`}
                </p>
                <span className="label-sm label-center">{W.names}</span>
                <div style={{height:8}}/>
                <p className="date-italic" style={{fontSize:18}}>{W.dateLong}</p>
                <div style={{height:6}}/>
                <p className="venue-sm">{W.venue}, {W.address}</p>
                <button className="btn btn-ghost" style={{marginTop:36}} onClick={() => go("invitation")}>Back to Invitation</button>
              </div>
            </div>
          </React.Fragment>
        );
      }

      /* ── ADMIN ── */
      if (screen === "admin") {
        const attending = rsvps.filter(r => r.attending === true);
        const declining = rsvps.filter(r => r.attending === false);
        const fullDay   = attending.filter(r => r.guest_type === "fullday");
        const evening   = attending.filter(r => r.guest_type === "evening");
        return (
          <React.Fragment>
            <style>{css}</style>
            <div className="app">
              <div className={`card card-wide ${visible ? "visible" : ""}`} style={{padding:"44px 36px"}}>
                <Corners/>
                <div className="admin-header">
                  <div>
                    <span className="label-sm">Admin Panel</span>
                    <h2 className="admin-title" style={{marginTop:4}}>{W.names}</h2>
                    <p className="detail-note">{W.dateLong}</p>
                  </div>
                  <div style={{display:"flex",gap:"8px"}}>
                    <button onClick={loadRsvps} style={{background:"none",border:"1px solid var(--border)",padding:"6px 14px",cursor:"pointer",fontFamily:"'Jost',sans-serif",fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",color:"var(--text-muted)"}}>
                      Refresh
                    </button>
                    <button onClick={downloadCSV} disabled={rsvps.length === 0} style={{background:"var(--blue-dark)",border:"1px solid var(--blue-dark)",padding:"6px 14px",cursor:rsvps.length===0?"not-allowed":"pointer",fontFamily:"'Jost',sans-serif",fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",color:"#fff",opacity:rsvps.length===0?0.4:1}}>
                      Download CSV
                    </button>
                  </div>
                </div>
                <Divider/>
                {adminLoading ? (
                  <p className="sub-italic" style={{textAlign:"center",padding:"30px 0"}}>Loading RSVPs…</p>
                ) : (
                  <React.Fragment>
                    <div className="stat-row">
                      <div className="stat-box"><span className="stat-num">{rsvps.length}</span><span className="label-sm">Total</span></div>
                      <div className="stat-box"><span className="stat-num">{attending.length}</span><span className="label-sm">Attending</span></div>
                      <div className="stat-box"><span className="stat-num">{fullDay.length}</span><span className="label-sm">Full Day</span></div>
                      <div className="stat-box"><span className="stat-num">{evening.length}</span><span className="label-sm">Evening</span></div>
                      <div className="stat-box"><span className="stat-num">{declining.length}</span><span className="label-sm">Declined</span></div>
                    </div>
                    {dbError && <div className="db-error">{dbError}</div>}
                    {rsvps.length === 0 ? (
                      <div className="empty-state">No RSVPs received yet</div>
                    ) : (
                      <div style={{overflowX:"auto"}}>
                        <table className="rsvp-table">
                          <thead>
                            <tr>
                              <th>Name</th><th>Type</th><th>Coming</th>
                              <th>Song</th><th>Dietary</th><th>Message</th>
                            </tr>
                          </thead>
                          <tbody>
                            {rsvps.map((r, i) => (
                              <tr key={i}>
                                <td style={{fontWeight:400,whiteSpace:"nowrap"}}>{r.name}</td>
                                <td><span className={`pill ${r.guest_type === "fullday" ? "pill-full" : "pill-eve"}`}>{r.guest_type === "fullday" ? "Full Day" : "Evening"}</span></td>
                                <td><span className={`pill ${r.attending ? "pill-yes" : "pill-no"}`}>{r.attending ? "Yes" : "No"}</span></td>
                                <td style={{fontStyle:"italic",color:r.song?"var(--text)":"var(--text-faint)"}}>{r.song||"—"}</td>
                                <td style={{color:r.dietary?"var(--text)":"var(--text-faint)"}}>{r.dietary||"—"}</td>
                                <td style={{fontStyle:"italic",color:r.message?"var(--text)":"var(--text-faint)"}}>{r.message||"—"}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </React.Fragment>
                )}
                <button className="btn btn-ghost" style={{marginTop:28}} onClick={() => { setCode(""); setGuestType(null); go("login"); }}>
                  Back to Login
                </button>
              </div>
            </div>
          </React.Fragment>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <script>
    (function () {
      const code = document.getElementById('app-source').textContent;
      const output = Babel.transform(code, { presets: [['react', { runtime: 'classic' }]] }).code;
      const script = document.createElement('script');
      script.text = output;
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
